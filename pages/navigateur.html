<!DOCTYPE html>
<html lang="fr">
<head>
    <style>
        body {
            margin: 0;
            font-family: 'W95FA', sans-serif;
            background-color: #C0C0C0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            padding: 5px;
            border-bottom: 2px solid #808080;
            align-items: center;
        }
        .address-bar {
            flex-grow: 1;
            padding: 3px;
            border: 2px solid;
            border-color: #808080 #FFF #FFF #808080;
            background: white;
            font-family: inherit;
        }
        .btn {
            background: #C0C0C0;
            border: 2px solid;
            border-color: #FFF #808080 #808080 #FFF;
            padding: 2px 10px;
            cursor: pointer;
        }
        .btn:active {
            border-color: #808080 #FFF #FFF #808080;
        }
        iframe {
            flex-grow: 1;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn" onclick="document.getElementById('web-frame').src='https://search.marginalia.nu/'">Home</button>
        <input type="text" class="address-bar" id="url-input" value="https://search.marginalia.nu/">
        <button class="btn" onclick="navigate()">Go</button>
    </div>

    <iframe id="web-frame" src="https://search.marginalia.nu/"></iframe>

    <script>
        function navigate() {
            const url = document.getElementById('url-input').value;
            // On force un peu le HTTPS si l'utilisateur l'oublie
            const target = url.startsWith('http') ? url : 'https://' + url;
            document.getElementById('web-frame').src = target;
        }
    </script>
</body>
</html>
